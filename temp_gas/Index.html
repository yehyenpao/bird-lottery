<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <base target="_top" />
    <title>超簡單錦標賽電視看板</title>
    <style>
      :root {
        --bg: #091423;
        --panel: rgba(10, 24, 43, 0.88);
        --panel-strong: rgba(8, 18, 34, 0.96);
        --line: rgba(148, 163, 184, 0.25);
        --line-strong: rgba(148, 163, 184, 0.4);
        --text: #eff6ff;
        --muted: #cbd5e1;
        --male: #2563eb;
        --female: #db2777;
        --other: #0f766e;
        --accent: #f59e0b;
        --success: #10b981;
        --danger: #ef4444;
        --shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Segoe UI", "Noto Sans TC", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(37, 99, 235, 0.2), transparent 30%),
          radial-gradient(circle at top right, rgba(245, 158, 11, 0.18), transparent 26%),
          linear-gradient(135deg, #08111f 0%, #0b1c31 52%, #112a46 100%);
      }

      body {
        padding: 10px;
        overflow: hidden;
      }

      .board {
        height: calc(100vh - 20px);
        display: grid;
        grid-template-rows: auto auto minmax(0, 1fr);
        gap: 10px;
        overflow: hidden;
      }

      .header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 10px 14px;
        border: 1px solid var(--line);
        border-radius: 20px;
        background: rgba(7, 17, 30, 0.82);
        box-shadow: var(--shadow);
        backdrop-filter: blur(14px);
      }

      .header-main {
        min-width: 0;
      }

      .header-title-row {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .title {
        margin: 0;
        font-size: clamp(20px, 2.15vw, 34px);
        line-height: 1;
        font-weight: 900;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .subtitle {
        margin-top: 4px;
        font-size: clamp(12px, 0.92vw, 15px);
        color: var(--muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .header-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: nowrap;
        justify-content: flex-end;
      }

      .meta-chip,
      .icon-btn {
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
      }

      .meta-chip {
        padding: 7px 12px;
        font-size: 13px;
        line-height: 1;
        font-weight: 700;
      }

      .clock {
        min-width: 112px;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }

      .icon-btn {
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .icon-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }

      .banner {
        display: none;
        padding: 9px 12px;
        border-radius: 12px;
        border: 1px solid rgba(16, 185, 129, 0.28);
        background: rgba(16, 185, 129, 0.16);
        color: #ecfdf5;
        font-size: 13px;
        font-weight: 700;
      }

      .banner.error {
        border-color: rgba(239, 68, 68, 0.35);
        background: rgba(127, 29, 29, 0.42);
        color: #fee2e2;
      }

      .grid {
        min-height: 0;
        display: grid;
        grid-template-columns: 2.15fr 1.15fr 1fr 1fr;
        grid-template-rows: 1fr 1fr 0.78fr;
        gap: 10px;
        grid-template-areas:
          "schedule schedule finals live"
          "schedule schedule standings group"
          "info info standings group";
        overflow: hidden;
      }

      .panel {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        border-radius: 20px;
        border: 1px solid var(--line);
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 9px 12px 8px;
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.03);
      }

      .panel-title {
        min-width: 0;
        font-size: clamp(14px, 1vw, 18px);
        font-weight: 900;
        letter-spacing: 0.02em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .panel-note {
        flex: none;
        font-size: 11px;
        color: var(--muted);
        font-weight: 700;
        white-space: nowrap;
      }

      .panel-body {
        flex: 1;
        min-height: 0;
        position: relative;
        padding: 8px;
        overflow: hidden;
      }

      #panelSchedule {
        grid-area: schedule;
      }

      #panelFinals {
        grid-area: finals;
      }

      #panelLive {
        grid-area: live;
      }

      #panelStandings {
        grid-area: standings;
      }

      #panelGroup {
        grid-area: group;
      }

      #panelInfo {
        grid-area: info;
      }

      .placeholder {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: rgba(226, 232, 240, 0.78);
        font-size: 14px;
        font-weight: 700;
        border: 1px dashed var(--line-strong);
        border-radius: 16px;
        padding: 12px;
      }

      .event-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 5px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 900;
        color: #fff;
      }

      .male {
        background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      }

      .female {
        background: linear-gradient(135deg, #be185d, #ec4899);
      }

      .other {
        background: linear-gradient(135deg, #0f766e, #14b8a6);
      }

      .schedule-viewport {
        width: 100%;
        height: 100%;
        overflow: hidden;
        display: flex;
        align-items: flex-start;
        justify-content: flex-start;
      }

      .schedule-stage {
        transform-origin: top left;
      }

      .schedule-table,
      .standings-table,
      .matrix-table {
        width: max-content;
        border-collapse: collapse;
        table-layout: fixed;
      }

      .schedule-table th,
      .schedule-table td,
      .standings-table th,
      .standings-table td,
      .matrix-table th,
      .matrix-table td {
        border: 1px solid rgba(148, 163, 184, 0.24);
      }

      .schedule-table th {
        background: rgba(15, 23, 42, 0.94);
        font-size: 16px;
        font-weight: 900;
        padding: 7px 8px;
      }

      .schedule-table td {
        background: rgba(255, 255, 255, 0.03);
        padding: 7px 8px;
        vertical-align: top;
      }

      .schedule-table .time-col {
        width: 96px;
        text-align: center;
        font-size: 17px;
        font-weight: 900;
        background: rgba(15, 23, 42, 0.84);
      }

      .schedule-table .court-col {
        width: 180px;
      }

      .schedule-card {
        min-height: 68px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 2px 0;
      }

      .schedule-order {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 12px;
        font-weight: 900;
      }

      .schedule-vs {
        font-size: 14px;
        font-weight: 800;
        line-height: 1.18;
      }

      .schedule-members {
        font-size: 11px;
        color: var(--muted);
        line-height: 1.2;
      }

      .schedule-score {
        display: inline-flex;
        align-self: flex-start;
        padding: 2px 7px;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.18);
        color: #fde68a;
        font-size: 12px;
        font-weight: 900;
      }

      .final-slide,
      .standings-slide,
      .group-slide,
      .info-card {
        height: 100%;
        border-radius: 18px;
        background: rgba(3, 7, 18, 0.34);
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .final-slide {
        display: flex;
        flex-direction: column;
      }

      .final-slide-head,
      .slide-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 9px 10px 6px;
      }

      .slide-label {
        font-size: 13px;
        font-weight: 800;
        color: var(--muted);
      }

      .bracket-columns {
        flex: 1;
        min-height: 0;
        display: grid;
        gap: 8px;
        padding: 4px 8px 8px;
      }

      .bracket-round {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .bracket-round-title {
        padding: 6px 8px;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.06);
        text-align: center;
        font-size: 12px;
        font-weight: 900;
      }

      .bracket-match {
        display: flex;
        flex-direction: column;
        gap: 5px;
        padding: 8px;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(148, 163, 184, 0.12);
        min-height: 76px;
      }

      .bracket-side {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        padding: 6px 7px;
        border-radius: 10px;
        background: rgba(2, 6, 23, 0.36);
        font-size: 12px;
        font-weight: 800;
      }

      .bracket-side.winner {
        background: rgba(16, 185, 129, 0.16);
        border: 1px solid rgba(16, 185, 129, 0.22);
      }

      .bracket-side-name {
        min-width: 0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .bracket-side-score {
        flex: none;
        color: #fde68a;
      }

      .bracket-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        font-size: 10px;
        color: var(--muted);
        font-weight: 700;
      }

      .live-list {
        height: 100%;
        display: grid;
        grid-auto-rows: minmax(0, 1fr);
        gap: 8px;
      }

      .live-card {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 8px;
        padding: 10px;
        border-radius: 18px;
        background: linear-gradient(160deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.8));
        border: 1px solid rgba(148, 163, 184, 0.14);
      }

      .live-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        font-size: 11px;
        color: var(--muted);
        font-weight: 800;
      }

      .live-event {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .live-team-name {
        font-size: 14px;
        font-weight: 900;
        line-height: 1.2;
      }

      .live-team-members {
        margin-top: 2px;
        color: var(--muted);
        font-size: 10px;
        line-height: 1.25;
      }

      .live-score {
        flex: none;
        min-width: 66px;
        text-align: center;
        font-size: 24px;
        font-weight: 900;
        color: #fde68a;
      }

      .live-row {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        gap: 8px;
        align-items: center;
      }

      .live-row .right {
        text-align: right;
      }

      .standings-slide,
      .group-slide {
        display: flex;
        flex-direction: column;
      }

      .standings-body,
      .group-body {
        flex: 1;
        min-height: 0;
        padding: 0 8px 8px;
      }

      .standings-table {
        width: 100%;
        height: 100%;
      }

      .standings-table th {
        padding: 7px 8px;
        background: rgba(15, 23, 42, 0.92);
        font-size: 12px;
        font-weight: 900;
      }

      .standings-table td {
        padding: 7px 8px;
        font-size: 12px;
        font-weight: 800;
        background: rgba(255, 255, 255, 0.03);
      }

      .rank-cell {
        width: 44px;
        text-align: center;
        font-size: 16px;
        color: #fde68a;
      }

      .group-meta {
        font-size: 13px;
        font-weight: 900;
      }

      .matrix-wrap {
        height: 100%;
        overflow: hidden;
      }

      .matrix-table {
        width: 100%;
        height: 100%;
      }

      .matrix-table th {
        padding: 8px 6px;
        background: rgba(15, 23, 42, 0.92);
        font-size: 11px;
        font-weight: 900;
        text-align: center;
      }

      .matrix-table td {
        padding: 6px 5px;
        text-align: center;
        background: rgba(255, 255, 255, 0.03);
        font-size: 12px;
        font-weight: 800;
      }

      .matrix-table .axis {
        background: rgba(15, 23, 42, 0.84);
        font-size: 12px;
        font-weight: 900;
      }

      .matrix-table .diag {
        background: rgba(148, 163, 184, 0.1);
        color: rgba(226, 232, 240, 0.55);
      }

      .matrix-score {
        display: block;
        color: #fde68a;
      }

      .matrix-status {
        display: block;
        margin-top: 3px;
        font-size: 10px;
        color: var(--muted);
      }

      .info-card {
        padding: 10px 12px;
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .info-block {
        padding: 10px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(148, 163, 184, 0.12);
      }

      .info-title {
        font-size: 13px;
        font-weight: 900;
        color: #fde68a;
        margin-bottom: 6px;
      }

      .info-text {
        font-size: 12px;
        line-height: 1.4;
        color: var(--text);
      }

      .info-text.muted {
        color: var(--muted);
      }

      @media (max-width: 1600px) {
        .grid {
          grid-template-columns: 1.8fr 1fr 1fr 1fr;
        }

        .bracket-columns {
          gap: 8px;
        }
      }

      @media (max-width: 1280px) {
        body {
          padding: 10px;
        }

        .board {
          min-height: calc(100vh - 20px);
        }

        .grid {
          grid-template-columns: 1fr;
          grid-template-rows: repeat(6, minmax(220px, auto));
          grid-template-areas:
            "schedule"
            "finals"
            "live"
            "standings"
            "group"
            "info";
        }

        .header {
          grid-template-columns: 1fr;
        }

        .header-meta {
          justify-content: flex-start;
        }

        .info-card {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="board">
      <section class="header">
        <div class="header-main">
          <div class="header-title-row">
            <h1 id="tvTitle" class="title">超簡單錦標賽電視看板</h1>
          </div>
          <div id="tvSubtitle" class="subtitle">正在連線試算表資料...</div>
        </div>
        <div class="header-meta">
          <div id="tvUpdatedAt" class="meta-chip">更新中</div>
          <div id="tvClock" class="meta-chip clock">--:--:--</div>
          <button id="refreshButton" class="icon-btn" type="button">重新整理</button>
          <button id="fullscreenButton" class="icon-btn" type="button">全螢幕</button>
        </div>
      </section>

      <div id="tvBanner" class="banner"></div>

      <main class="grid">
        <section id="panelSchedule" class="panel">
          <div class="panel-head">
            <div class="panel-title">場地時間表</div>
            <div class="panel-note">整張總覽，自動縮放</div>
          </div>
          <div id="tvSchedule" class="panel-body"></div>
        </section>

        <section id="panelFinals" class="panel">
          <div class="panel-head">
            <div class="panel-title">男雙、女雙決賽對陣圖</div>
            <div class="panel-note">每 10 秒輪播 1 張</div>
          </div>
          <div id="tvFinals" class="panel-body"></div>
        </section>

        <section id="panelLive" class="panel">
          <div class="panel-head">
            <div class="panel-title">即時比分</div>
            <div class="panel-note">每 15 秒更新</div>
          </div>
          <div id="tvLive" class="panel-body"></div>
        </section>

        <section id="panelStandings" class="panel">
          <div class="panel-head">
            <div class="panel-title">預賽排名表</div>
            <div class="panel-note">每 10 秒跳下一組</div>
          </div>
          <div id="tvStandings" class="panel-body"></div>
        </section>

        <section id="panelGroup" class="panel">
          <div class="panel-head">
            <div class="panel-title">預賽對戰圖</div>
            <div class="panel-note">每 10 秒跳下一組</div>
          </div>
          <div id="tvGroup" class="panel-body"></div>
        </section>

        <section id="panelInfo" class="panel">
          <div class="panel-head">
            <div class="panel-title">公告資訊</div>
            <div class="panel-note">靜態文字區</div>
          </div>
          <div id="tvInfo" class="panel-body"></div>
        </section>
      </main>
    </div>

    <script>
      const REFRESH_INTERVAL_MS = 15000;
      const ROTATE_INTERVAL_MS = 10000;

      const state = {
        dashboard: createEmptyDashboard(),
        initialized: false,
        pendingFetch: false,
        fetchRetryTimer: null,
        indices: {
          finals: 0,
          standings: 0,
          groups: 0,
        },
        timers: {
          clock: null,
          refresh: null,
          rotate: null,
        },
      };

      function createEmptyDashboard() {
        return {
          roster: [],
          schedule: [],
          standings: {},
          brackets: [],
          config: {},
          meta: {},
          summaries: {},
        };
      }

      function initBoard() {
        if (state.initialized) {
          return;
        }
        state.initialized = true;

        document.getElementById("refreshButton").addEventListener("click", function () {
          fetchDashboard(true);
        });
        document.getElementById("fullscreenButton").addEventListener("click", enterFullscreen);
        window.addEventListener("resize", fitScheduleScale);

        updateClock();
        state.timers.clock = setInterval(updateClock, 1000);
        state.timers.refresh = setInterval(function () {
          fetchDashboard(false);
        }, REFRESH_INTERVAL_MS);
        state.timers.rotate = setInterval(function () {
          state.indices.finals += 1;
          state.indices.standings += 1;
          state.indices.groups += 1;
          renderAll();
        }, ROTATE_INTERVAL_MS);

        renderAll();
        fetchDashboard(true);
      }

      function updateClock() {
        const clock = document.getElementById("tvClock");
        if (!clock) {
          return;
        }
        clock.textContent = new Date().toLocaleTimeString("zh-TW", {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        });
      }

      function fetchDashboard(showLoading) {
        if (state.pendingFetch) {
          return;
        }

        if (!isGoogleScriptReady()) {
          if (showLoading) {
            showBanner("正在等待 Google Apps Script 載入...", false);
          }
          scheduleFetchRetry();
          return;
        }

        clearFetchRetry();
        state.pendingFetch = true;

        if (showLoading) {
          showBanner("讀取試算表資料中...", false);
        }

        google.script.run
          .withSuccessHandler(function (result) {
            state.pendingFetch = false;
            state.dashboard = normalizeDashboard(result);
            hideBanner();
            renderAll();
          })
          .withFailureHandler(function (error) {
            state.pendingFetch = false;
            const message = error && error.message ? error.message : String(error || "讀取失敗");
            showBanner(message, true);
          })
          .getDashboard();
      }

      function scheduleFetchRetry() {
        if (state.fetchRetryTimer) {
          return;
        }
        state.fetchRetryTimer = setTimeout(function () {
          state.fetchRetryTimer = null;
          fetchDashboard(false);
        }, 1200);
      }

      function clearFetchRetry() {
        if (state.fetchRetryTimer) {
          clearTimeout(state.fetchRetryTimer);
          state.fetchRetryTimer = null;
        }
      }

      function isGoogleScriptReady() {
        return typeof google !== "undefined" && google && google.script && google.script.run;
      }

      function normalizeDashboard(result) {
        const data = result || {};
        return {
          roster: Array.isArray(data.roster) ? data.roster : [],
          schedule: Array.isArray(data.schedule) ? data.schedule : [],
          standings: data.standings && typeof data.standings === "object" ? data.standings : {},
          brackets: Array.isArray(data.brackets) ? data.brackets : [],
          config: data.config && typeof data.config === "object" ? data.config : {},
          meta: data.meta && typeof data.meta === "object" ? data.meta : {},
          summaries: data.summaries && typeof data.summaries === "object" ? data.summaries : {},
        };
      }

      function renderAll() {
        renderHeader();
        renderSchedule();
        renderFinals();
        renderLiveScores();
        renderStandings();
        renderGroupMatrix();
        renderInfo();
      }

      function renderHeader() {
        const meta = state.dashboard.meta || {};
        const config = state.dashboard.config || {};
        const summaries = state.dashboard.summaries || {};
        const schedule = state.dashboard.schedule || [];

        const title = meta.spreadsheetName || "超簡單錦標賽電視看板";
        const courtCount = Math.max(1, Number(config.courtCount) || inferCourtCount(schedule));
        const totalMatches = Number(summaries.totalMatches || 0);
        const completedMatches = Number(summaries.completedMatches || 0);

        document.getElementById("tvTitle").textContent = title;
        document.getElementById("tvSubtitle").textContent =
          "場地 " +
          courtCount +
          " 面 / 賽程 " +
          totalMatches +
          " 場 / 已完成 " +
          completedMatches +
          " 場";

        document.getElementById("tvUpdatedAt").textContent =
          "更新 " +
          new Date().toLocaleTimeString("zh-TW", {
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false,
          });
      }

      function renderSchedule() {
        const container = document.getElementById("tvSchedule");
        const schedule = sortSchedule(state.dashboard.schedule || []);
        if (!schedule.length) {
          container.innerHTML = placeholderHtml("目前沒有賽程資料");
          return;
        }

        const config = state.dashboard.config || {};
        const courtCount = Math.max(1, Number(config.courtCount) || inferCourtCount(schedule));
        const courts = Array.from({ length: courtCount }, function (_item, index) {
          return String(index + 1);
        });
        const times = unique(schedule.map(function (match) {
          return normalizeTime(match.time);
        })).sort(compareText);
        const matchMap = {};

        schedule.forEach(function (match) {
          matchMap[normalizeTime(match.time) + "::" + normalizeCourt(match.court)] = match;
        });

        const html =
          '<div class="schedule-viewport">' +
          '<div class="schedule-stage">' +
          '<table class="schedule-table">' +
          "<thead><tr><th class=\"time-col\">時間 / 場地</th>" +
          courts
            .map(function (court) {
              return '<th class="court-col">場地 ' + escapeHtml(court) + "</th>";
            })
            .join("") +
          "</tr></thead>" +
          "<tbody>" +
          times
            .map(function (time) {
              return (
                "<tr>" +
                '<td class="time-col">' +
                escapeHtml(time) +
                "</td>" +
                courts
                  .map(function (court) {
                    const match = matchMap[time + "::" + court];
                    if (!match) {
                      return '<td class="court-col"></td>';
                    }
                    return '<td class="court-col">' + renderScheduleCard(match) + "</td>";
                  })
                  .join("") +
                "</tr>"
              );
            })
            .join("") +
          "</tbody></table></div></div>";

        container.innerHTML = html;
        requestAnimationFrame(fitScheduleScale);
      }

      function renderScheduleCard(match) {
        const toneClass = getEventTone(match.eventName);
        const scoreHtml =
          match.scoreA !== "" && match.scoreB !== ""
            ? '<span class="schedule-score">' +
              escapeHtml(String(match.scoreA)) +
              " : " +
              escapeHtml(String(match.scoreB)) +
              "</span>"
            : "";

        return (
          '<div class="schedule-card">' +
          '<div class="schedule-order">' +
          '<span class="event-chip ' +
          toneClass +
          '">' +
          escapeHtml(getShortEventName(match.eventName)) +
          "</span>" +
          "<span>#" +
          escapeHtml(String(match.order || "")) +
          "</span>" +
          "</div>" +
          '<div class="schedule-vs">' +
          escapeHtml(match.teamAName || "待定") +
          " vs " +
          escapeHtml(match.teamBName || "待定") +
          "</div>" +
          '<div class="schedule-members">' +
          escapeHtml(match.teamAMembers || "") +
          (match.teamAMembers && match.teamBMembers ? " / " : "") +
          escapeHtml(match.teamBMembers || "") +
          "</div>" +
          scoreHtml +
          "</div>"
        );
      }

      function fitScheduleScale() {
        const container = document.getElementById("tvSchedule");
        if (!container) {
          return;
        }
        const viewport = container.querySelector(".schedule-viewport");
        const stage = container.querySelector(".schedule-stage");
        const table = container.querySelector(".schedule-table");
        if (!viewport || !stage || !table) {
          return;
        }

        stage.style.transform = "scale(1)";
        const tableWidth = table.offsetWidth || 1;
        const tableHeight = table.offsetHeight || 1;
        const scale = Math.min(viewport.clientWidth / tableWidth, viewport.clientHeight / tableHeight, 1);
        stage.style.width = tableWidth + "px";
        stage.style.height = tableHeight + "px";
        stage.style.transform = "scale(" + scale + ")";
      }

      function renderFinals() {
        const container = document.getElementById("tvFinals");
        const slides = buildFinalSlides(state.dashboard.schedule || []);
        if (!slides.length) {
          container.innerHTML = placeholderHtml("目前尚未產生決賽對陣圖");
          return;
        }

        const index = normalizeCarouselIndex(state.indices.finals, slides.length);
        state.indices.finals = index;
        const slide = slides[index];
        const columnCount = Math.max(1, slide.rounds.length);

        container.innerHTML =
          '<div class="final-slide">' +
          '<div class="final-slide-head">' +
          '<span class="event-chip ' +
          getEventTone(slide.eventName) +
          '">' +
          escapeHtml(getShortEventName(slide.eventName)) +
          "</span>" +
          '<span class="slide-label">' +
          escapeHtml(String(index + 1)) +
          " / " +
          escapeHtml(String(slides.length)) +
          "</span>" +
          "</div>" +
          '<div class="bracket-columns" style="grid-template-columns: repeat(' +
          columnCount +
          ', minmax(0, 1fr));">' +
          slide.rounds
            .map(function (round) {
              return renderBracketRound(round);
            })
            .join("") +
          "</div>" +
          "</div>";
      }

      function buildFinalSlides(schedule) {
        const grouped = {};

        schedule
          .filter(isFinalMatch)
          .forEach(function (match) {
            const eventName = String(match.eventName || "").trim() || "決賽";
            if (!grouped[eventName]) {
              grouped[eventName] = [];
            }
            grouped[eventName].push(match);
          });

        return Object.keys(grouped)
          .sort(compareFinalEvents)
          .map(function (eventName) {
            const matches = grouped[eventName]
              .slice()
              .sort(function (left, right) {
                const leftInfo = parseRoundInfo(left.slotLabel);
                const rightInfo = parseRoundInfo(right.slotLabel);
                if (leftInfo.round !== rightInfo.round) {
                  return leftInfo.round - rightInfo.round;
                }
                return leftInfo.matchNumber - rightInfo.matchNumber;
              });

            const roundsMap = {};
            let maxRound = 0;

            matches.forEach(function (match) {
              const info = parseRoundInfo(match.slotLabel);
              maxRound = Math.max(maxRound, info.round);
              const key = String(info.round);
              if (!roundsMap[key]) {
                roundsMap[key] = [];
              }
              roundsMap[key].push(match);
            });

            const rounds = Object.keys(roundsMap)
              .map(function (key) {
                return Number(key);
              })
              .sort(function (left, right) {
                return left - right;
              })
              .map(function (roundNumber) {
                return {
                  title: getRoundTitle(roundNumber, maxRound),
                  matches: roundsMap[String(roundNumber)].slice().sort(function (left, right) {
                    return parseRoundInfo(left.slotLabel).matchNumber - parseRoundInfo(right.slotLabel).matchNumber;
                  }),
                };
              });

            return {
              eventName: eventName,
              rounds: rounds,
            };
          });
      }

      function renderBracketRound(round) {
        return (
          '<div class="bracket-round">' +
          '<div class="bracket-round-title">' +
          escapeHtml(round.title) +
          "</div>" +
          round.matches
            .map(function (match) {
              return renderBracketMatch(match);
            })
            .join("") +
          "</div>"
        );
      }

      function renderBracketMatch(match) {
        const winner = String(match.winner || "").trim();
        const sides = [
          {
            name: match.teamAName || "待定",
            members: match.teamAMembers || "",
            score: match.scoreA,
            winner: winner && winner === match.teamAName,
          },
          {
            name: match.teamBName || "待定",
            members: match.teamBMembers || "",
            score: match.scoreB,
            winner: winner && winner === match.teamBName,
          },
        ];

        return (
          '<div class="bracket-match">' +
          sides
            .map(function (side) {
              return (
                '<div class="bracket-side' +
                (side.winner ? " winner" : "") +
                '">' +
                '<span class="bracket-side-name">' +
                escapeHtml(side.name) +
                "</span>" +
                '<span class="bracket-side-score">' +
                (side.score === "" || side.score == null ? "" : escapeHtml(String(side.score))) +
                "</span>" +
                "</div>"
              );
            })
            .join("") +
          '<div class="bracket-meta">' +
          "<span>" +
          escapeHtml(normalizeTime(match.time) || "未排時間") +
          "</span>" +
          "<span>#" +
          escapeHtml(String(match.order || "")) +
          "</span>" +
          "</div>" +
          "</div>"
        );
      }

      function renderLiveScores() {
        const container = document.getElementById("tvLive");
        const liveMatches = sortSchedule((state.dashboard.schedule || []).filter(isLiveMatch)).slice(0, 3);
        if (!liveMatches.length) {

          return;

        container.innerHTML =
          '<div class="live-list">' +

      function renderLiveCard(match) {
        return (
          '<article class="live-card">' +
          '<div class="live-top">' +
          '<div class="live-event">' +
          '<span class="event-chip ' +
          getEventTone(match.eventName) +
          '">' +
          escapeHtml(getShortEventName(match.eventName)) +
          "</span>" +
          "<span>" +
          escapeHtml(normalizeCourtLabel(match.court)) +
          "</span>" +
          "</div>" +
          "<span>" +
          escapeHtml(normalizeTime(match.time)) +
          "</span>" +
          "</div>" +
          '<div class="live-row">' +
          '<div>' +
          '<div class="live-team-name">' +
          escapeHtml(match.teamAName || "待定") +
          "</div>" +
          '<div class="live-team-members">' +
          escapeHtml(match.teamAMembers || "") +
          "</div>" +
          "</div>" +
          '<div class="live-score">' +

          " : " +

          "</div>" +
          '<div class="right">' +
          '<div class="live-team-name">' +
          escapeHtml(match.teamBName || "待定") +
          "</div>" +

          escapeHtml(match.teamBMembers || "") +

      function renderStandings() {
        const container = document.getElementById("tvStandings");
        const slides = buildStandingsSlides(state.dashboard.standings || {});
        if (!slides.length) {
          container.innerHTML = placeholderHtml("目前沒有預賽排名資料");
          return;

        const index = normalizeCarouselIndex(state.indices.standings, slides.length);
        state.indices.standings = index;
        const slide = slides[index];

        container.innerHTML =
          '<div class="standings-slide">' +
          '<div class="slide-head">' +
          '<div class="group-meta">' +
          '<span class="event-chip ' +
          getEventTone(slide.eventName) +
          '">' +
          escapeHtml(getShortEventName(slide.eventName)) +
          "</span> " +
          escapeHtml(slide.groupCode) +
          "</div>" +
          '<span class="slide-label">' +
          escapeHtml(String(index + 1)) +
          " / " +
          escapeHtml(String(slides.length)) +
          "</span>" +
          "</div>" +
          '<div class="standings-body">' +
          '<table class="standings-table">' +
          "<thead><tr><th>名次</th><th>隊伍</th><th>勝敗</th><th>積分</th><th>得失分</th></tr></thead>" +
          "<tbody>" +
          slide.teams
            .map(function (team) {
              return (
                "<tr>" +
                '<td class="rank-cell">' +
                escapeHtml(String(team.rank || "")) +
                "</td>" +
                "<td>" +
                escapeHtml(team.teamName || "") +
                "</td>" +
                "<td>" +
                escapeHtml(String(team.wins || 0)) +
                "-" +
                escapeHtml(String(team.losses || 0)) +
                "</td>" +
                "<td>" +
                escapeHtml(String(team.standingsPoints || 0)) +
                "</td>" +
                "<td>" +
                escapeHtml(String(team.scoreFor || 0)) +
                ":" +
                escapeHtml(String(team.scoreAgainst || 0)) +
                "</td>" +
                "</tr>"
              );
            })
            .join("") +
          "</tbody></table>" +
          "</div>" +
          "</div>";
      }

      function buildStandingsSlides(standings) {
        const slides = [];
        Object.keys(standings)
          .sort(compareFinalEvents)
          .forEach(function (eventName) {
            Object.keys(standings[eventName] || {})
              .sort(compareText)
              .forEach(function (groupCode) {
                slides.push({
                  eventName: eventName,
                  groupCode: groupCode,
                  teams: Array.isArray(standings[eventName][groupCode]) ? standings[eventName][groupCode] : [],
                });
              });
          });
        return slides;
      }

      function renderGroupMatrix() {
        const container = document.getElementById("tvGroup");
        const slides = buildGroupSlides(state.dashboard.schedule || [], state.dashboard.standings || {});
        if (!slides.length) {
          container.innerHTML = placeholderHtml("目前沒有預賽對戰圖資料");
          return;
        }

        const index = normalizeCarouselIndex(state.indices.groups, slides.length);
        state.indices.groups = index;
        const slide = slides[index];
        const teams = slide.teams;

        container.innerHTML =
          '<div class="group-slide">' +
          '<div class="slide-head">' +
          '<div class="group-meta">' +
          '<span class="event-chip ' +
          getEventTone(slide.eventName) +
          '">' +
          escapeHtml(getShortEventName(slide.eventName)) +
          "</span> " +
          escapeHtml(slide.groupCode) +
          "</div>" +
          '<span class="slide-label">' +
          escapeHtml(String(index + 1)) +
          " / " +
          escapeHtml(String(slides.length)) +
          "</span>" +
          "</div>" +
          '<div class="group-body">' +
          '<div class="matrix-wrap">' +
          '<table class="matrix-table">' +
          "<thead><tr><th class=\"axis\">隊伍</th>" +
          teams
            .map(function (team) {
              return "<th>" + escapeHtml(team.teamName) + "</th>";
            })
            .join("") +
          "</tr></thead>" +
          "<tbody>" +
          teams
            .map(function (rowTeam) {
              return (
                "<tr>" +
                '<th class="axis">' +
                escapeHtml(rowTeam.teamName) +
                "</th>" +
                teams
                  .map(function (colTeam) {
                    if (rowTeam.teamName === colTeam.teamName) {
                      return '<td class="diag">-</td>';
                    }
                    return "<td>" + renderMatrixCell(slide.matches, rowTeam.teamName, colTeam.teamName) + "</td>";
                  })
                  .join("") +
                "</tr>"
              );
            })
            .join("") +
          "</tbody></table></div></div></div>";
      }

      function buildGroupSlides(schedule, standings) {
        const groupedMatches = {};

        schedule
          .filter(isGroupMatch)
          .forEach(function (match) {
            const eventName = String(match.eventName || "").trim();
            const groupCode = String(match.slotLabel || "").trim();
            const key = eventName + "::" + groupCode;
            if (!groupedMatches[key]) {
              groupedMatches[key] = {
                eventName: eventName,
                groupCode: groupCode,
                matches: [],
              };
            }
            groupedMatches[key].matches.push(match);
          });

        return Object.keys(groupedMatches)
          .sort(compareText)
          .map(function (key) {
            const item = groupedMatches[key];
            const standingTeams =
              standings[item.eventName] && Array.isArray(standings[item.eventName][item.groupCode])
                ? standings[item.eventName][item.groupCode]
                : [];

            const teams = standingTeams.length
              ? standingTeams.map(function (team) {
                  return { teamName: team.teamName };
                })
              : collectTeamsFromMatches(item.matches).map(function (teamName) {
                  return { teamName: teamName };
                });

            return {
              eventName: item.eventName,
              groupCode: item.groupCode,
              matches: item.matches,
              teams: teams,
            };
          });
      }

      function renderMatrixCell(matches, teamA, teamB) {
        const match = matches.find(function (item) {
          return (
            (item.teamAName === teamA && item.teamBName === teamB) ||
            (item.teamAName === teamB && item.teamBName === teamA)
          );
        });

        if (!match) {
          return '<span class="matrix-status">未排</span>';
        }

        if (match.scoreA !== "" && match.scoreB !== "") {
          const scoreText =
            match.teamAName === teamA
              ? String(match.scoreA) + " : " + String(match.scoreB)
              : String(match.scoreB) + " : " + String(match.scoreA);
          return '<span class="matrix-score">' + escapeHtml(scoreText) + "</span>";
        }

        if (isLiveMatch(match)) {
          return '<span class="matrix-status">進行中</span>';
        }

        return '<span class="matrix-status">' + escapeHtml(normalizeTime(match.time) || "未開打") + "</span>";
      }

      function renderInfo() {

        const meta = state.dashboard.meta || {};
        const spreadsheetName = meta.spreadsheetName || "目前試算表";

        container.innerHTML =
          '<div class="info-card">' +
          '<div class="info-block">' +
          '<div class="info-title">資料來源</div>' +
          '<div class="info-text">' +
          escapeHtml(spreadsheetName) +
          "</div>" +
          '<div class="info-text muted">已固定連線指定試算表，電子看板會定時抓取最新資料。</div>' +
          "</div>" +
          '<div class="info-block">' +
          '<div class="info-title">更新規則</div>' +
          '<div class="info-text">即時比分每 15 秒更新一次。</div>' +
          '<div class="info-text">決賽對陣圖、預賽排名表、預賽對戰圖每 10 秒輪播下一張。</div>' +
          "</div>" +
          '<div class="info-block">' +
          '<div class="info-title">看板說明</div>' +
          '<div class="info-text">QR Code 功能已先暫停，這個區塊改成靜態文字資訊，之後可再換成圖片或公告。</div>' +
          "</div>" +
          '<div class="info-block">' +
          '<div class="info-title">現場提示</div>' +
          '<div class="info-text">若某區塊暫時沒有資料，代表該類型賽程尚未建立或尚未進入對應狀態。</div>' +
          "</div>" +
          "</div>";
      }

      function showBanner(message, isError) {
        const banner = document.getElementById("tvBanner");
        banner.className = isError ? "banner error" : "banner";
        banner.style.display = "block";
        banner.textContent = String(message || "");
      }

      function hideBanner() {
        const banner = document.getElementById("tvBanner");
        banner.style.display = "none";
        banner.textContent = "";
        banner.className = "banner";
      }

      function enterFullscreen() {
        const element = document.documentElement;
        if (element.requestFullscreen) {
          element.requestFullscreen();
          return;
        }
        if (element.webkitRequestFullscreen) {
          element.webkitRequestFullscreen();
          return;
        }
        if (element.msRequestFullscreen) {
          element.msRequestFullscreen();
        }
      }

      function placeholderHtml(text) {
        return '<div class="placeholder">' + escapeHtml(text) + "</div>";
      }

      function sortSchedule(schedule) {
        return schedule.slice().sort(function (left, right) {
          const leftTime = normalizeTime(left.time);
          const rightTime = normalizeTime(right.time);
          if (leftTime !== rightTime) {
            return compareText(leftTime, rightTime);
          }
          const leftCourt = Number(normalizeCourt(left.court)) || 0;
          const rightCourt = Number(normalizeCourt(right.court)) || 0;
          if (leftCourt !== rightCourt) {
            return leftCourt - rightCourt;
          }
          return (Number(left.order) || 0) - (Number(right.order) || 0);
        });
      }

      function normalizeCarouselIndex(index, length) {
        if (!length) {
          return 0;
        }
        return ((Number(index) || 0) % length + length) % length;
      }

      function normalizeTime(time) {
        return String(time || "").trim();
      }

      function normalizeCourt(court) {
        const text = String(court || "").trim();
        const match = text.match(/\d+/);
        return match ? match[0] : text;
      }

      function normalizeCourtLabel(court) {
        const normalized = normalizeCourt(court);
        return normalized ? "場地 " + normalized : String(court || "");
      }

      function inferCourtCount(schedule) {
        return schedule.reduce(function (max, match) {
          return Math.max(max, Number(normalizeCourt(match.court)) || 0);
        }, 1);
      }

      function unique(values) {
        return Array.from(new Set(values));
      }

      function collectTeamsFromMatches(matches) {
        return unique(
          matches
            .reduce(function (list, match) {
              if (match.teamAName) {
                list.push(match.teamAName);
              }
              if (match.teamBName) {
                list.push(match.teamBName);
              }
              return list;
            }, [])
            .filter(Boolean)
        ).sort(compareText);
      }

      function parseRoundInfo(slotLabel) {
        const text = String(slotLabel || "");
        const match = text.match(/R(\d+)M(\d+)/i);
        if (!match) {
          return { round: 99, matchNumber: 99 };
        }
        return {
          round: Number(match[1]) || 99,
          matchNumber: Number(match[2]) || 99,
        };
      }

      function getRoundTitle(roundNumber, maxRound) {
        if (roundNumber === maxRound) {
          return "決賽";
        }
        if (roundNumber === maxRound - 1) {
          return "四強";
        }
        if (roundNumber === maxRound - 2) {
          return "八強";
        }
        return "R" + roundNumber;
      }

      function compareFinalEvents(left, right) {
        const priority = function (value) {
          const tone = getEventTone(value);
          if (tone === "male") {
            return 1;
          }
          if (tone === "female") {
            return 2;
          }
          return 9;
        };

        const diff = priority(left) - priority(right);
        if (diff !== 0) {
          return diff;
        }
        return compareText(left, right);
      }

      function compareText(left, right) {
        return String(left || "").localeCompare(String(right || ""), "zh-Hant", {
          numeric: true,
          sensitivity: "base",
        });
      }

      function isFinalMatch(match) {
        const stage = String((match && match.stage) || "").trim();
        const slotLabel = String((match && match.slotLabel) || "").trim();
        return /決賽|final/i.test(stage) || /(^|:)R\d+M\d+$/i.test(slotLabel);
      }

      function isGroupMatch(match) {
        const slotLabel = String((match && match.slotLabel) || "").trim();
        return Boolean(slotLabel) && !isFinalMatch(match);
      }

      function isLiveMatch(match) {
        const status = String((match && match.status) || "").trim();
        return /進行|in.?progress|ongoing|live/i.test(status);
      }

      function getEventTone(eventName) {
        const text = String(eventName || "").trim();
        if (/男|male/i.test(text)) {
          return "male";
        }
        if (/女|female/i.test(text)) {
          return "female";
        }
        return "other";
      }

      function getShortEventName(eventName) {
        const text = String(eventName || "").trim();
        if (!text) {
          return "賽事";
        }
        if (/男雙/i.test(text)) {
          return "男雙";
        }
        if (/女雙/i.test(text)) {
          return "女雙";
        }
        if (/男/i.test(text)) {
          return "男組";
        }
        if (/女/i.test(text)) {
          return "女組";
        }
        return text;
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initBoard, { once: true });
      } else {
        initBoard();
      }
      window.addEventListener("load", initBoard, { once: true });
    </script>
  </body>
</html>
